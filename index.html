<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Baja SPUR Sarawak (Fixed v8)</title>
<style>
body { margin:0; font-family:sans-serif; }
.header { position:sticky; top:0; z-index:1000; background:#1f7a4c; color:#fff; padding:16px; }
.native-bottom-nav { position:fixed; bottom:0; left:0; right:0; height:70px; background:#fff; z-index:1200; display:flex; justify-content:space-around; align-items:center; }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  z-index:3001;
}
body.modal-open .native-bottom-nav,
body.modal-open .header {
  pointer-events: none;
}
button { padding:12px 20px; background:#1f7a4c; color:#fff; border:none; border-radius:10px; }
</style>
</head>
<body class="modal-open">

<div class="header">Baja SPUR Sarawak</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <h3>Masukkan Nama</h3>
    <input placeholder="Nama anda" style="padding:10px;width:100%;margin-bottom:10px;">
    <button onclick="closeModal()">Masuk</button>
  </div>
</div>

<div class="native-bottom-nav">
  <div>Stok</div>
  <div>Masuk</div>
  <div>Rekod</div>
</div>

<script>
function closeModal(){
  document.body.classList.remove('modal-open');
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
